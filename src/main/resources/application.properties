# =============================================================================
# LinkedIn Profile MCP Server — configuration
# =============================================================================
# STDIO transport: Claude Desktop launches this process and speaks JSON-RPC over
# stdin/stdout. Keep stdout clean; use file logging (below) or stderr only.
# =============================================================================

spring.application.name=linkedin-profile-mcp-server

# --- Spring AI MCP server (STDIO) --------------------------------------------
# Enable STDIO transport (required for Claude Desktop subprocess integration).
spring.ai.mcp.server.stdio=true
# Human-readable server identity shown to MCP clients.
spring.ai.mcp.server.name=LinkedIn Profile
spring.ai.mcp.server.version=1.0.0
# Synchronous tool execution (matches @Tool methods on beans).
spring.ai.mcp.server.type=SYNC

# NOTE: Some docs mention spring.ai.mcp.server.transport=stdio; Spring AI 1.0.x
# uses spring.ai.mcp.server.stdio=true (above). Keeping transport in sync:
spring.ai.mcp.server.enabled=true

# --- Process hygiene (STDIO safety) -----------------------------------------
# No embedded web server for this MCP server.
spring.main.web-application-type=none
# Avoid printing the Spring banner to stdout.
spring.main.banner-mode=off
# Reduce startup chatter on stdout (logs still go to file below).
spring.main.log-startup-info=false

# --- Logging (file only — NEVER log INFO/WARN to stdout in STDIO mode) -------
logging.file.name=linkedin-mcp.log
logging.level.root=INFO
logging.level.com.linkedin.mcp=DEBUG
# Clear console pattern so default console appenders emit no visible line content.
logging.pattern.console=

# --- LinkedIn export directory ------------------------------------------------
# Point to the folder that contains Profile.json, Positions.json, etc.
# Override at runtime: -Dlinkedin.data.path=... or LINKEDIN_DATA_PATH env var.
linkedin.data.path=${LINKEDIN_DATA_PATH:/path/to/linkedin/export}
